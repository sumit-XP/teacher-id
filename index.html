<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teacher Details Form</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #ffffff;
      --base: #f4f7fb;
      --navy: #1f3a5f;
      --teal: #0f766e;
      --danger: #a83232;
      --focus: #2563eb;
      --shadow: 0 12px 32px rgba(23, 32, 42, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--base);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: var(--navy);
      font-weight: 700;
    }

    .app-shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.4vw, 2.35rem);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .layout {
      margin-top: 24px;
    }

    form {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    form {
      display: grid;
      gap: 18px;
      padding: 20px;
    }

    .section {
      display: grid;
      gap: 14px;
    }

    .section + .section {
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: grid;
      gap: 6px;
      color: #2f3b4a;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 400;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid #c9d2df;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    input[type="file"] {
      padding: 8px;
    }

    .photo-preview {
      display: grid;
      place-items: center;
      overflow: hidden;
      min-height: 210px;
      border: 1px dashed #aeb9c8;
      border-radius: 8px;
      background: #f8fafc;
      color: var(--muted);
      text-align: center;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      max-height: 320px;
      object-fit: contain;
      background: #fff;
    }

    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-weight: 400;
      color: var(--ink);
    }

    .check-row input {
      width: 18px;
      min-height: 18px;
      margin-top: 2px;
      accent-color: var(--teal);
    }

    .btn {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 9px 14px;
      background: #e7edf5;
      color: var(--ink);
      font-weight: 700;
    }

    .btn.primary {
      background: var(--navy);
      color: #fff;
    }

    .btn.success {
      background: var(--teal);
      color: #fff;
    }

    .btn.danger {
      background: #fff1f1;
      border-color: #e7b2b2;
      color: var(--danger);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 2px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .status {
      flex: 1 1 100%;
      margin: 0;
      min-height: 22px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .status.success {
      color: var(--teal);
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    .success-screen {
      display: none;
      place-items: center;
      min-height: 520px;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 32px 20px;
      text-align: center;
    }

    .success-screen.active {
      display: grid;
    }

    .success-card {
      display: grid;
      justify-items: center;
      gap: 14px;
      width: min(480px, 100%);
    }

    .success-mark {
      display: grid;
      place-items: center;
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #e7f7f2;
      color: var(--teal);
      font-size: 2.5rem;
      font-weight: 800;
    }

    .success-card h2 {
      margin-top: 6px;
      font-size: 1.55rem;
    }

    .success-card p {
      margin: 0 0 8px;
      color: var(--muted);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(244, 247, 251, 0.82);
      backdrop-filter: blur(4px);
    }

    .loading-overlay.active {
      display: grid;
    }

    .loading-card {
      display: grid;
      justify-items: center;
      gap: 14px;
      width: min(320px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: 24px;
      text-align: center;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 4px solid #dce6ef;
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-card strong {
      font-size: 1rem;
    }

    .loading-card span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 680px) {
      .app-shell {
        padding: 14px;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }

      form {
        padding: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .actions .btn {
        flex: 1 1 150px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div>
        <h1>Teacher Details Form</h1>
        <p class="subtitle">Collect teacher identification details and submit them securely.</p>
      </div>
    </header>

    <div class="layout">
      <form id="teacherForm">
        <section class="section" aria-labelledby="basic-section">
          <h2 id="basic-section">Basic Details</h2>
          <div class="grid">
            <label>
              Name
              <input id="fullName" name="fullName" autocomplete="name" required placeholder="Enter name">
            </label>
            <label>
              Mobile number
              <input id="mobile" name="mobile" type="tel" autocomplete="tel" required placeholder="+91 98765 43210">
            </label>
            <label>
              Email
              <input id="email" name="email" type="email" autocomplete="email" required placeholder="teacher@example.com">
            </label>
            <label>
              Blood group
              <select id="bloodGroup" name="bloodGroup" required>
                <option value="">Select blood group</option>
                <option>A+</option>
                <option>A-</option>
                <option>B+</option>
                <option>B-</option>
                <option>AB+</option>
                <option>AB-</option>
                <option>O+</option>
                <option>O-</option>
                <option>Unknown</option>
              </select>
            </label>
            <label>
              Date of birth
              <input id="dob" name="dob" type="date">
            </label>
            <label>
              Gender
              <select id="gender" name="gender">
                <option value="">Select gender</option>
                <option>Female</option>
                <option>Male</option>
                <option>Other</option>
                <option>Prefer not to say</option>
              </select>
            </label>
            <label class="full">
              Residential address
              <textarea id="residentialAddress" name="residentialAddress" autocomplete="street-address" placeholder="House no., street, city, district, state, PIN"></textarea>
            </label>
          </div>
        </section>

        <section class="section" aria-labelledby="photo-section">
          <h2 id="photo-section">Image Upload</h2>
          <div class="grid">
            <label>
              Teacher photo
              <span class="hint">JPG or PNG is best.</span>
              <input id="photo" name="photo" type="file" accept="image/*">
            </label>
            <div class="photo-preview" id="photoPreview">No image selected</div>
          </div>
        </section>

        <section class="section" aria-labelledby="more-section">
          <h2 id="more-section">Additional Details</h2>
          <div class="grid">
            <label class="full">
              Identification mark
              <input id="identificationMark" name="identificationMark" placeholder="Optional visible identifying mark">
            </label>
            <label class="full">
              Allergies / medical notes
              <textarea id="medicalNotes" name="medicalNotes" placeholder="Optional notes useful in an emergency"></textarea>
            </label>
            <label class="full check-row">
              <input id="consent" name="consent" type="checkbox" required>
              <span>I confirm the details are accurate and can be used for school identification records.</span>
            </label>
          </div>
        </section>

        <div class="actions">
          <p class="status" id="statusText"></p>
          <button class="btn danger" type="reset">Clear Form</button>
          <button class="btn success" type="submit" id="submitButton">Submit Details</button>
        </div>
      </form>

      <section class="success-screen" id="successScreen" aria-live="polite">
        <div class="success-card">
          <div class="success-mark" aria-hidden="true">✓</div>
          <h2>Details Submitted</h2>
          <p>The teacher information has been saved successfully.</p>
          <button class="btn primary" type="button" id="submitAnother">Submit Another Response</button>
        </div>
      </section>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay" role="status" aria-live="polite" aria-hidden="true">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <strong>Submitting details</strong>
      <span>Please wait while the information is saved.</span>
    </div>
  </div>

  <script>
    const GOOGLE_SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxRe3O-8tUSLZBVD8ltg6d1NAxl7BjcdUrQ_0LCLpliw6m2Xxreq2AaC0XlPwLl5rwcWQ/exec";
    const form = document.querySelector("#teacherForm");
    const statusText = document.querySelector("#statusText");
    const loadingOverlay = document.querySelector("#loadingOverlay");
    const successScreen = document.querySelector("#successScreen");
    const submitAnother = document.querySelector("#submitAnother");
    const submitButton = document.querySelector("#submitButton");
    const fields = [
      "fullName",
      "mobile",
      "email",
      "bloodGroup",
      "dob",
      "gender",
      "residentialAddress",
      "identificationMark",
      "medicalNotes"
    ];

    let photoPayload = null;

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.className = type ? `status ${type}` : "status";
    }

    function setLoading(isLoading) {
      loadingOverlay.classList.toggle("active", isLoading);
      loadingOverlay.setAttribute("aria-hidden", String(!isLoading));
      submitButton.disabled = isLoading;
      Array.from(form.elements).forEach((element) => {
        element.disabled = isLoading;
      });
    }

    function showSuccessScreen() {
      form.style.display = "none";
      successScreen.classList.add("active");
      submitAnother.focus();
    }

    function showForm() {
      successScreen.classList.remove("active");
      form.style.display = "";
      form.elements.fullName.focus();
    }

    function getFormData() {
      const data = {};
      fields.forEach((field) => {
        data[field] = form.elements[field].value.trim();
      });
      data.photo = photoPayload;
      data.submittedAt = new Date().toISOString();
      return data;
    }

    function previewPhoto(file) {
      const photoPreview = document.querySelector("#photoPreview");
      if (!file) {
        photoPayload = null;
        photoPreview.textContent = "No image selected";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        photoPayload = {
          name: file.name,
          type: file.type || "image/jpeg",
          data: String(reader.result).split(",")[1] || ""
        };

        photoPreview.innerHTML = "";
        const image = document.createElement("img");
        image.src = reader.result;
        image.alt = "Uploaded teacher photo";
        photoPreview.appendChild(image);
      };
      reader.readAsDataURL(file);
    }

    form.elements.photo.addEventListener("change", (event) => {
      previewPhoto(event.target.files[0]);
    });

    form.addEventListener("reset", () => {
      window.setTimeout(() => {
        photoPayload = null;
        form.elements.photo.value = "";
        document.querySelector("#photoPreview").textContent = "No image selected";
        setStatus("", "");
      }, 0);
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!form.reportValidity()) {
        return;
      }

      const endpoint = GOOGLE_SHEET_WEB_APP_URL.trim();
      if (!endpoint) {
        setStatus("This form is not connected yet. Please contact the administrator.", "error");
        return;
      }

      setStatus("", "");
      setLoading(true);

      try {
        await fetch(endpoint, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(getFormData())
        });

        form.reset();
        window.setTimeout(() => {
          setLoading(false);
          showSuccessScreen();
        }, 0);
      } catch (error) {
        setLoading(false);
        setStatus("Submission failed. Check the Web App URL and deployment access.", "error");
      }
    });

    submitAnother.addEventListener("click", () => {
      setStatus("", "");
      showForm();
    });
  </script>
</body>
</html>
